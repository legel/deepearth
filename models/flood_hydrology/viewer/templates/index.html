<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Johns Lake — Digital Twin Viewer</title>
  <link rel="stylesheet" href="/static/css/styles.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="left-stack">
    <div id="controls-panel">
      <div class="panel-title">Johns Lake · Digital Twin</div>
      <div class="panel-subtitle">Winter Garden, FL — 28.52°N 81.66°W</div>
      <div id="layer-list"></div>
      <div class="panel-divider"></div>
      <div class="panel-hint">Drag to orbit · Scroll to zoom · Shift+drag to pan</div>
    </div>

    <div id="simulation-panel">
      <!-- populated by simulationControls.js after page load -->
    </div>
  </div>

  <div id="info-panel">
    <span id="hover-info">Hover for elevation</span>
  </div>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <div id="loading-text">Loading terrain data…</div>
  </div>

  <script type="module" src="/static/js/main.js"></script>
</body>
</html>
