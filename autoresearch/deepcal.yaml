# DeepCal: DeepEarth over variables observed across California.
name: DeepCal

data:
  adapter: california
  cache_dir: data/deepcal          # relative to the repo root; `prepare.py` downloads + extracts the cache here. Absolute paths are honored as-is; a fresh device just runs prepare.py to populate it.
  n_neighbors: 16                    # down from 24: two findings favor fewer neighbors -- (1) step-limited (fewer neighbor tokens -> faster -> more steps at fixed budget), (2) community doesn't transfer under spatial holdout (commdrop showed over-reliance on non-transferable community hurts A1).

model:
  d_model: 256
  n_latents: 24
  n_layers: 4
  capacity: 16                       # space-time encoder resolution (hash levels)
  decoder_hidden: 2048               # sweeping up (512->1024: +2.2%,+1.0%): finding the interface-decoder capacity ceiling (rule 23). Watch for turnover / VRAM.
  rounds: 2                          # science.md rule 22: iterative joint decoding (K refinement rounds w/ write-back), a multi-modal diffusion vs one-shot. write_back/learned_mask default on for rounds>1.
  compile: compiled                  # science.md rule 21: full-step torch.compile (~2.4x throughput, bit-identical math) -> more steps at the fixed 600s budget -> higher net_score. "compiled" = stable fusion, no CUDA graphs (avoids buffer aliasing on this 767M model).
  sparse_hash: true                  # sparse-Adam + precompute for the absolute encoder: bit-identical training, ~12% faster (0.758 vs 0.747). Costs ~+2GB VRAM (precompute cache) — set false to train the absolute hash with the dense optimizer if VRAM-bound.
  relative_window: [8000, 8000, 300, 130]   # neighbor-offset half-window: north_m, east_m, up_m, days
  manifolds:                          # vector subspaces treated like space and time
    biological: phylo                 # the biological subspace uses the evolutionary-position vector's width
  loss_weights:                       # science.md rule 18: up-weight reconstruction of variables tied to non-maxed benchmarks (vision_dino->A6/loo_vision, phylo->A5); maxed benchmarks have margin.
    vision_dino: 2.0
    phylo: 2.0
  contrastive_weight: 0.05            # JEPA / rule 16: batch-InfoNCE auxiliary so predicted vision_dino retrieves its own target vs the batch (a global cross-modal signal cosine can't give). Targets A6/loo_vision.
  contrastive_vars: [vision_dino]
  species_graph:                      # phylogenomic species GNN (science.md rules 7-12): refine per-species state so an obs of species A updates its relatives B,C,...; identity is read from the refined table
    variable: identity
    operator: ou-attention            # distance-biased attention over the E1 phylo-distance matrix (2141 species, dense)
    layers: 2
    heads: 4

variables:
  - {name: vision_dino, kind: continuous, neighbor: true}   # a ground-image representation, also read from neighbors
  - {name: vision_bio,  kind: continuous}                    # a second ground-image representation
  - {name: identity,    kind: categorical, classes: identity, neighbor: true}
  - {name: phylo,       kind: continuous}                    # an evolutionary-position vector
  - {expand: trait_classes}                                  # one categorical per descriptor, widths from the data
  - {name: climate,  kind: continuous}                       # Daymet 180-day x 7  (universal environmental input)
  - {name: soil,     kind: continuous}                       # SSURGO soil properties
  - {name: naip_rgb, kind: continuous}                       # NAIP aerial DINOv3-SAT493M (RGB)
  - {name: naip_ir,  kind: continuous}                       # NAIP aerial DINOv3-SAT493M (IR)
  - {name: clay,     kind: continuous}                       # Clay v1.5 / Sentinel-2 embedding

condition_on: [vision_dino, vision_bio]    # the widely-available inputs used at evaluation

training:
  steps: 8000
  batch: 512
  hide_prob: 0.50                    # up from 0.35: the benchmarks reveal only a small given set (heavy masking), so training with more hidden variables better matches the induction-heavy eval distribution (train/eval mask alignment).
  lr: 0.0005                         # re-checking the LR optimum at nn16 (lost at nn24, but nn16 does more steps -> may now favor a higher LR).
  weight_decay: 0.0003
  precision: bf16                     # science.md rule 21: autocast the Processor + decoders to bf16 (Earth4D hash stays fp32) -> Ampere tensor cores ~2x -> more steps at the fixed 600s budget
