condition_on:
- vision_dino
- vision_bio
data:
  adapter: california
  cache_dir: data/deepcal
  n_neighbors: 16
  time_axis: true
model:
  capacity: 20
  compile: compiled
  contrastive_vars:
  - vision_dino
  - naip_rgb
  - naip_ir
  - clay
  contrastive_weight: 0.1
  d_model: 256
  decoder_hidden: 2048
  densify_weight: 0.3
  flower_weight: 0.1
  lfmc_weight: 0.1
  loss_weights:
    phylo: 2.0
    vision_dino: 2.0
  manifolds:
    biological: phylo
  myco_weight: 0.1
  n_latents: 32
  n_layers: 4
  phylo_head_routing: true      # OUR validated feature (0.491->0.503); additive, his config lacked it
  phylo_mask_weight: 0.1
  poll_weight: 0.1
  pollinator_top_k: 64
  relative_window:
  - 8000
  - 8000
  - 300
  - 130
  rounds: 2
  sdist_weight: 0.7
  smooth_geo: true
  smooth_geo_sigmas:
  - 0.25
  - 1.0
  - 4.0
  - 16.0
  - 64.0
  sparse_hash: true      # big-rig optimal (sparse-Adam + precompute, ~12% faster); train.py auto-disables on <40GB GPUs (bit-identical)
  species_graph:
    bioclip_init: true
    heads: 4
    layers: 2
    operator: latent-clade
    top_k: 128
    variable: identity
name: DeepCal
training:
  batch: 512              # big-rig optimal; train.py auto-caps to 256 (<40GB) / 128 (<18GB) so this config fits smaller cards
  hide_prob: 0.5
  lr: 0.0005
  precision: bf16
  seed: 1337
  steps: 16000
  time_budget_s: 600      # rule 20: fixed 10-min equal-time budget (universal protocol, not hardware); big rigs simply do more steps in the window
  weight_decay: 0.001
variables:
- kind: continuous
  name: vision_dino
  neighbor: true
- kind: continuous
  name: vision_bio
- classes: identity
  kind: categorical
  name: identity
  neighbor: true
- kind: continuous
  name: phylo
- expand: trait_classes
- kind: continuous
  name: climate
- kind: continuous
  name: soil
- kind: continuous
  name: naip_rgb
- kind: continuous
  name: naip_ir
- kind: continuous
  name: clay
- kind: continuous
  name: topo
- kind: continuous
  name: chm
- kind: continuous
  name: hydro
- kind: continuous
  name: phenology
